<!DOCTYPE html>
<html lang="en">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="referrer" content="no-referrer">
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
        color: #202124;
        background: #f5f6f8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px 14px;
      }

      .card {
        width: min(780px, 100%);
        margin: 0 auto;
        background: #fff;
        border: 1px solid #dadce0;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 2px 8px rgba(60, 64, 67, 0.12);
      }

      h1 { margin-top: 0; font-size: 1.8rem; }
      h2 { line-height: 1.4; font-size: 1.25rem; }
      p { line-height: 1.55; }

      .notice {
        background: #f8f9fa;
        border-left: 4px solid #5f6368;
        padding: 12px 14px;
        white-space: pre-wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: -4px 0 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid #e8eaed;
      }

      .company-logo, .company-logo-placeholder {
        width: 64px;
        height: 64px;
        flex: 0 0 64px;
        border-radius: 12px;
      }

      .company-logo {
        display: block;
        object-fit: contain;
        background: #fff;
        border: 1px solid #dadce0;
        padding: 5px;
      }

      .company-logo-placeholder {
        display: grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(135deg, #1a73e8, #174ea6);
        box-shadow: 0 3px 10px rgba(26, 115, 232, 0.24);
      }

      .company-logo-placeholder svg { width: 34px; height: 34px; }

      .company-name {
        color: #202124;
        font-size: 1.25rem;
        font-weight: 700;
        line-height: 1.3;
      }

      .company-label {
        color: #5f6368;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        margin-bottom: 3px;
        text-transform: uppercase;
      }

      .row {
        display: flex;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .meta {
        color: #5f6368;
        font-size: 0.92rem;
      }

      .timer {
        font-size: 1.1rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .progress {
        height: 8px;
        background: #e8eaed;
        border-radius: 999px;
        overflow: hidden;
        margin: 14px 0 24px;
      }

      .progress > div {
        height: 100%;
        background: #1a73e8;
        width: 0;
      }

      label { display: block; margin: 12px 0 6px; }

      input[type="text"], textarea {
        width: 100%;
        border: 1px solid #9aa0a6;
        border-radius: 6px;
        padding: 12px;
        font: inherit;
      }

      textarea { resize: vertical; min-height: 190px; }

      input[type="text"]:focus, textarea:focus {
        outline: 2px solid #1a73e8;
        outline-offset: 1px;
      }

      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #dadce0;
        border-radius: 7px;
        padding: 11px;
        margin: 9px 0;
        cursor: pointer;
      }

      .choice input { margin-top: 3px; }

      button {
        border: 0;
        border-radius: 6px;
        padding: 11px 18px;
        font: inherit;
        font-weight: 700;
        background: #1a73e8;
        color: #fff;
        cursor: pointer;
      }

      button:disabled { opacity: 0.55; cursor: not-allowed; }

      .error {
        color: #b3261e;
        background: #fce8e6;
        padding: 10px 12px;
        border-radius: 6px;
        margin: 12px 0;
      }

      .success {
        color: #137333;
        background: #e6f4ea;
        padding: 14px;
        border-radius: 6px;
      }

      .completion-actions { margin-top: 20px; }
      .close-hint { color: #5f6368; margin: 12px 0 0; }

      .hidden { display: none !important; }
      .word-count { text-align: right; color: #5f6368; font-size: 0.86rem; margin-top: 6px; }
      .required { color: #b3261e; }
      .save-status { color: #5f6368; font-size: 0.86rem; min-height: 1.2em; text-align: right; }

      @media (max-width: 600px) {
        .card { padding: 20px; }
        body { padding: 10px; }
      }
    </style>
  </head>

  <body data-initial-token="<?= initialToken ?>">
    <main class="card">
      <section id="startView">
        <div class="brand" aria-label="Company">
          <? if (companyLogoUrl) { ?>
            <img
              id="companyLogo"
              class="company-logo"
              src="<?= companyLogoUrl ?>"
              alt="<?= companyName ?> logo"
              referrerpolicy="no-referrer"
              decoding="async"
            >
            <div id="companyLogoFallback" class="company-logo-placeholder hidden" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 20V8l7-4 7 4v12M9 20v-5h6v5M8 10h1m3 0h1m3 0h1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          <? } else { ?>
            <div class="company-logo-placeholder" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 20V8l7-4 7 4v12M9 20v-5h6v5M8 10h1m3 0h1m3 0h1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          <? } ?>
          <div>
            <div class="company-label">Candidate assessment</div>
            <div class="company-name"><?= companyName ?></div>
          </div>
        </div>

        <h1><?= assessmentTitle ?></h1>
        <p class="notice"><?= privacyNotice ?></p>

        <div id="tokenArea">
          <label for="tokenInput">Candidate token</label>
          <input id="tokenInput" type="text" autocomplete="off" spellcheck="false">
        </div>

        <label class="choice" for="acknowledge">
          <input id="acknowledge" type="checkbox">
          <span>I have read the assessment instructions and the activity-recording notice.</span>
        </label>

        <div id="startError" class="error hidden" role="alert"></div>
        <button id="startButton" type="button">Start assessment</button>
      </section>

      <section id="assessmentView" class="hidden">
        <div class="row">
          <div>
            <div id="candidateLabel" class="meta"></div>
            <div id="questionNumber" class="meta"></div>
          </div>
          <div id="timer" class="timer" aria-live="polite"></div>
        </div>

        <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
        <div id="groupLabel" class="meta"></div>
        <h2 id="questionText"></h2>
        <div id="answerArea"></div>
        <div id="wordCount" class="word-count"></div>
        <div id="saveStatus" class="save-status" role="status" aria-live="polite"></div>
        <div id="questionError" class="error hidden" role="alert"></div>

        <div class="row" style="margin-top: 24px; justify-content: flex-end;">
          <button id="nextButton" type="button">Save and continue</button>
        </div>
      </section>

      <section id="completeView" class="hidden">
        <h1>Assessment submitted</h1>
        <p id="completeMessage" class="success"></p>
        <div class="completion-actions">
          <button id="closeButton" type="button">Close form</button>
          <p id="closeHint" class="close-hint hidden" role="status">
            This browser did not allow the tab to close automatically. You can safely close it now.
          </p>
        </div>
      </section>
    </main>

    <script>
      'use strict';

      const els = {
        startView: document.getElementById('startView'),
        assessmentView: document.getElementById('assessmentView'),
        completeView: document.getElementById('completeView'),
        tokenArea: document.getElementById('tokenArea'),
        tokenInput: document.getElementById('tokenInput'),
        acknowledge: document.getElementById('acknowledge'),
        startButton: document.getElementById('startButton'),
        startError: document.getElementById('startError'),
        candidateLabel: document.getElementById('candidateLabel'),
        questionNumber: document.getElementById('questionNumber'),
        timer: document.getElementById('timer'),
        progressBar: document.getElementById('progressBar'),
        groupLabel: document.getElementById('groupLabel'),
        questionText: document.getElementById('questionText'),
        answerArea: document.getElementById('answerArea'),
        wordCount: document.getElementById('wordCount'),
        saveStatus: document.getElementById('saveStatus'),
        questionError: document.getElementById('questionError'),
        nextButton: document.getElementById('nextButton'),
        completeMessage: document.getElementById('completeMessage'),
        closeButton: document.getElementById('closeButton'),
        closeHint: document.getElementById('closeHint'),
      };

      const companyLogo = document.getElementById('companyLogo');
      const companyLogoFallback = document.getElementById('companyLogoFallback');
      if (companyLogo && companyLogoFallback) {
        const showLogoFallback = () => {
          companyLogo.classList.add('hidden');
          companyLogoFallback.classList.remove('hidden');
        };
        companyLogo.addEventListener('error', showLogoFallback);
        if (companyLogo.complete && companyLogo.naturalWidth === 0) showLogoFallback();
      }

      const tokenFromUrl = document.body.dataset.initialToken || '';
      document.body.removeAttribute('data-initial-token');
      let initialToken = tokenFromUrl;
      try {
        if (tokenFromUrl) {
          sessionStorage.setItem('assessmentCandidateToken', tokenFromUrl);
        } else {
          initialToken = sessionStorage.getItem('assessmentCandidateToken') || '';
        }
      } catch (error) {
        // Session storage can be disabled; the original candidate link still works.
      }
      els.tokenInput.value = initialToken;
      if (initialToken) els.tokenArea.classList.add('hidden');
      if (tokenFromUrl && window.history && window.history.replaceState) {
        try {
          const cleanUrl = new URL(window.location.href);
          cleanUrl.searchParams.delete('token');
          window.history.replaceState({}, document.title, cleanUrl.toString());
        } catch (error) {
          // URL cleanup is a privacy improvement; it is not required to continue.
        }
      }

      let state = null;
      let metrics = null;
      let activeSegmentStartedAt = null;
      let clockOffsetMs = 0;
      let timerHandle = null;
      let snapshotTimerHandle = null;
      let submitting = false;
      let assessmentInProgress = false;
      let storageKey = '';
      let previousAnswer = '';
      let pendingPasteAt = 0;
      let snapshotFlushInProgress = false;

      cleanupLocalDrafts();

      els.startButton.addEventListener('click', beginAssessment);
      els.nextButton.addEventListener('click', () => submitCurrent(false));
      els.closeButton.addEventListener('click', closeForm);

      document.addEventListener('visibilitychange', () => {
        if (!assessmentInProgress || !metrics) return;
        if (document.hidden) {
          stopActiveSegment();
          metrics.tabLeaveCount += 1;
          persistState();
        } else {
          startActiveSegment();
        }
      });

      window.addEventListener('blur', () => {
        if (!assessmentInProgress || !metrics) return;
        stopActiveSegment();
        const metricsAtBlur = metrics;
        setTimeout(() => {
          if (
            assessmentInProgress &&
            metrics === metricsAtBlur &&
            !document.hidden &&
            !document.hasFocus()
          ) {
            metrics.blurCount += 1;
            persistState();
          }
        }, 0);
      });

      window.addEventListener('focus', () => {
        if (assessmentInProgress) startActiveSegment();
      });

      window.addEventListener('beforeunload', (event) => {
        if (!assessmentInProgress || submitting) return;
        event.preventDefault();
        event.returnValue = '';
      });

      function beginAssessment() {
        hideError(els.startError);
        const token = els.tokenInput.value.trim();

        if (!token) {
          showError(els.startError, 'Open the unique candidate link or enter your token.');
          return;
        }
        if (!els.acknowledge.checked) {
          showError(els.startError, 'Confirm that you have read the instructions and recording notice.');
          return;
        }

        els.startButton.disabled = true;
        els.startButton.textContent = 'Starting…';
        google.script.run
          .withSuccessHandler((result) => {
            els.startButton.disabled = false;
            els.startButton.textContent = 'Start assessment';
            handleServerState(result);
          })
          .withFailureHandler((error) => {
            els.startButton.disabled = false;
            els.startButton.textContent = 'Start assessment';
            showError(els.startError, friendlyError(error));
          })
          .startAssessment(token, collectClientInfo());
      }

      function handleServerState(result) {
        if (!result || !result.ok) {
          const target = assessmentInProgress ? els.questionError : els.startError;
          if (assessmentInProgress) {
            submitting = false;
            els.nextButton.disabled = false;
            updateNextButtonLabel();
            els.nextButton.removeAttribute('aria-busy');
            startActiveSegment();
            startSnapshotTimer();
          }
          showError(target, result && result.message ? result.message : 'The assessment could not be loaded.');
          return;
        }

        if (result.completed) {
          finishAssessment(result.message || 'Your responses have been submitted.');
          return;
        }

        const previousStorageKey = storageKey;
        state = result;
        clockOffsetMs = Number(result.serverNowMs) - Date.now();
        storageKey = `assessment:${state.sessionId}:${state.question.id}`;

        if (previousStorageKey && previousStorageKey !== storageKey) {
          try {
            localStorage.removeItem(previousStorageKey);
          } catch (error) {
            // Local storage may be disabled.
          }
        }

        renderQuestion();
      }

      function renderQuestion() {
        assessmentInProgress = true;
        submitting = false;
        stopSnapshotTimer();
        activeSegmentStartedAt = null;
        pendingPasteAt = 0;
        hideError(els.questionError);
        els.startView.classList.add('hidden');
        els.completeView.classList.add('hidden');
        els.assessmentView.classList.remove('hidden');

        els.candidateLabel.textContent = state.candidateName
          ? `Candidate: ${state.candidateName}`
          : 'Candidate assessment';
        els.questionNumber.textContent = `Question ${state.currentNumber} of ${state.totalQuestions}`;
        els.progressBar.style.width = `${(state.currentNumber / state.totalQuestions) * 100}%`;
        els.groupLabel.textContent = state.question.groupId ? `Group: ${state.question.groupId}` : '';
        els.questionText.replaceChildren(document.createTextNode(state.question.text));
        if (state.question.required) {
          const requiredMarker = document.createElement('span');
          requiredMarker.className = 'required';
          requiredMarker.textContent = ' *';
          requiredMarker.title = 'Required';
          requiredMarker.setAttribute('aria-label', ' required');
          els.questionText.appendChild(requiredMarker);
        }

        metrics = loadStoredState();
        const wasRestored = Boolean(metrics.answer || metrics.snapshots.length);
        buildAnswerControl();
        previousAnswer = readAnswer();
        updateWordCount();
        startActiveSegment();
        captureSnapshot(wasRestored ? 'restored' : 'question_shown', true);
        startOverallTimer();
        startSnapshotTimer();
        flushProgress();

        updateNextButtonLabel();
        els.nextButton.disabled = false;
        els.nextButton.removeAttribute('aria-busy');
        setSaveStatus(wasRestored ? 'Draft restored from this device.' : 'Draft saved on this device.');
      }

      function loadStoredState() {
        const defaults = {
          answer: '',
          activeMs: 0,
          firstInteractionMs: null,
          pasteCount: 0,
          tabLeaveCount: 0,
          blurCount: 0,
          keyCount: 0,
          typedCharacters: 0,
          pastedCharacters: 0,
          largestInsertionCharacters: 0,
          deletedCharacters: 0,
          deletionEvents: 0,
          revisionEvents: 0,
          undoCount: 0,
          redoCount: 0,
          lastEditMs: null,
          snapshots: [],
          snapshotSequence: 0,
          submissionId: createClientId(),
        };

        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
          if (!saved || typeof saved !== 'object') return defaults;
          if (Number(saved.expiresAtMs) && Number(saved.expiresAtMs) <= Date.now()) {
            localStorage.removeItem(storageKey);
            return defaults;
          }
          const merged = { ...defaults, ...saved };
          merged.snapshots = Array.isArray(saved.snapshots) ? saved.snapshots : [];
          merged.snapshotSequence = Math.max(
            Number(merged.snapshotSequence) || 0,
            ...merged.snapshots.map((snapshot) => Number(snapshot.sequence) || 0)
          );
          if (!merged.submissionId) merged.submissionId = createClientId();
          return merged;
        } catch (error) {
          return defaults;
        }
      }

      function buildAnswerControl() {
        els.answerArea.replaceChildren();
        const type = state.question.answerType;

        if (type === 'multiple_choice') {
          state.question.options.forEach((option, index) => {
            const label = document.createElement('label');
            label.className = 'choice';

            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'answer';
            radio.value = option;
            radio.id = `choice_${index}`;
            radio.checked = metrics.answer === option;

            const text = document.createElement('span');
            text.textContent = option;

            attachChoiceEvents(radio);
            label.append(radio, text);
            els.answerArea.appendChild(label);
          });
          return;
        }

        const input = type === 'short_text'
          ? document.createElement('input')
          : document.createElement('textarea');

        if (type === 'short_text') {
          input.type = 'text';
        } else {
          input.rows = 10;
        }

        input.id = 'answerInput';
        input.value = metrics.answer || '';
        input.maxLength = Math.max(1, Number(state.maxAnswerCharacters) || 40000);
        input.autocomplete = 'off';
        input.spellcheck = true;
        input.setAttribute('aria-label', 'Your answer');
        attachTextEvents(input);
        els.answerArea.appendChild(input);
        input.focus();
      }

      function attachChoiceEvents(input) {
        input.addEventListener('change', () => {
          markFirstInteraction();
          const answer = readAnswer();
          if (answer !== previousAnswer) {
            metrics.revisionEvents += 1;
            metrics.lastEditMs = elapsedSinceQuestionShown();
            previousAnswer = answer;
          }
          metrics.answer = answer;
          updateWordCount();
          persistState();
        });
      }

      function attachTextEvents(input) {
        input.addEventListener('input', (event) => {
          markFirstInteraction();
          const answer = input.value;
          const delta = calculateTextDelta(previousAnswer, answer);
          const inputType = String(event.inputType || '');
          const isUndo = inputType === 'historyUndo';
          const isRedo = inputType === 'historyRedo';
          const isDrop = inputType === 'insertFromDrop';
          const isPasteLike =
            inputType === 'insertFromPaste' ||
            (pendingPasteAt > 0 && Date.now() - pendingPasteAt < 2000);

          if (answer !== previousAnswer) {
            metrics.revisionEvents += 1;
            metrics.lastEditMs = elapsedSinceQuestionShown();

            if (delta.deletedCharacters > 0) {
              metrics.deletedCharacters += delta.deletedCharacters;
              metrics.deletionEvents += 1;
            }

            if (delta.insertedCharacters > 0) {
              metrics.largestInsertionCharacters = Math.max(
                metrics.largestInsertionCharacters,
                delta.insertedCharacters
              );

              if (isPasteLike) {
                metrics.pastedCharacters += delta.insertedCharacters;
              } else if (!isUndo && !isRedo && !isDrop) {
                metrics.typedCharacters += delta.insertedCharacters;
              }
            }

            if (isUndo) metrics.undoCount += 1;
            if (isRedo) metrics.redoCount += 1;
          }

          pendingPasteAt = 0;
          previousAnswer = answer;
          metrics.answer = answer;
          updateWordCount();
          persistState();
        });

        input.addEventListener('paste', () => {
          markFirstInteraction();
          metrics.pasteCount += 1;
          pendingPasteAt = Date.now();
          persistState();
          setTimeout(() => {
            captureSnapshot('paste', true);
            flushProgress();
          }, 0);
        });

        input.addEventListener('keydown', (event) => {
          markFirstInteraction();
          const isEditingKey =
            event.key.length === 1 || ['Backspace', 'Delete', 'Enter'].includes(event.key);
          if (isEditingKey) {
            metrics.keyCount += 1;
            if (metrics.keyCount % 10 === 0) persistState();
          }
        });
      }

      function calculateTextDelta(previousText, nextText) {
        const previous = String(previousText || '');
        const next = String(nextText || '');
        let prefixLength = 0;
        const sharedLength = Math.min(previous.length, next.length);

        while (
          prefixLength < sharedLength &&
          previous.charCodeAt(prefixLength) === next.charCodeAt(prefixLength)
        ) {
          prefixLength += 1;
        }

        let suffixLength = 0;
        while (
          suffixLength < previous.length - prefixLength &&
          suffixLength < next.length - prefixLength &&
          previous.charCodeAt(previous.length - 1 - suffixLength) ===
            next.charCodeAt(next.length - 1 - suffixLength)
        ) {
          suffixLength += 1;
        }

        return {
          insertedCharacters: Math.max(0, next.length - prefixLength - suffixLength),
          deletedCharacters: Math.max(0, previous.length - prefixLength - suffixLength),
        };
      }

      function elapsedSinceQuestionShown() {
        return Math.max(0, correctedNow() - Number(state.questionShownAtMs));
      }

      function markFirstInteraction() {
        if (metrics.firstInteractionMs != null) return;
        metrics.firstInteractionMs = Math.max(0, correctedNow() - Number(state.questionShownAtMs));
      }

      function readAnswer() {
        if (state.question.answerType === 'multiple_choice') {
          const checked = document.querySelector('input[name="answer"]:checked');
          return checked ? checked.value : '';
        }
        const input = document.getElementById('answerInput');
        return input ? input.value : '';
      }

      function updateWordCount() {
        const answer = readAnswer();
        metrics.answer = answer;
        const words = countWords(answer);
        const characterCount = `${answer.length} / ${Number(state.maxAnswerCharacters) || 40000} characters`;
        if (state.question.maxWords) {
          els.wordCount.textContent = `${words} / ${state.question.maxWords} words · ${characterCount}`;
        } else {
          els.wordCount.textContent = answer ? `${words} words · ${characterCount}` : characterCount;
        }
      }

      function submitCurrent(forceComplete) {
        if (!state || submitting) return;
        hideError(els.questionError);

        const answer = readAnswer().trim();
        const wordCount = countWords(answer);
        const maxAnswerCharacters = Math.max(1, Number(state.maxAnswerCharacters) || 40000);

        if (answer.length > maxAnswerCharacters) {
          showError(
            els.questionError,
            `This answer is ${answer.length} characters. The maximum is ${maxAnswerCharacters}.`
          );
          return;
        }

        if (!forceComplete) {
          if (state.question.required && !answer) {
            showError(els.questionError, 'An answer is required before continuing.');
            return;
          }
          if (state.question.maxWords && wordCount > state.question.maxWords) {
            showError(
              els.questionError,
              `This answer is ${wordCount} words. The maximum is ${state.question.maxWords}.`
            );
            return;
          }
        }

        captureSnapshot('submit', true);
        stopSnapshotTimer();
        metrics.answer = answer;
        stopActiveSegment();
        persistState();
        submitting = true;
        els.nextButton.disabled = true;
        els.nextButton.textContent = 'Saving…';
        els.nextButton.setAttribute('aria-busy', 'true');
        setSaveStatus('Saving your answer…');

        const payload = {
          sessionId: state.sessionId,
          sessionNonce: state.sessionNonce || '',
          questionId: state.question.id,
          submissionId: metrics.submissionId,
          answer,
          activeMs: metrics.activeMs,
          firstInteractionMs: metrics.firstInteractionMs,
          pasteCount: metrics.pasteCount,
          tabLeaveCount: metrics.tabLeaveCount,
          blurCount: metrics.blurCount,
          keyCount: metrics.keyCount,
          typedCharacters: metrics.typedCharacters,
          pastedCharacters: metrics.pastedCharacters,
          largestInsertionCharacters: metrics.largestInsertionCharacters,
          deletedCharacters: metrics.deletedCharacters,
          deletionEvents: metrics.deletionEvents,
          revisionEvents: metrics.revisionEvents,
          undoCount: metrics.undoCount,
          redoCount: metrics.redoCount,
          lastEditMs: metrics.lastEditMs,
          snapshots: metrics.snapshots,
          forceComplete: Boolean(forceComplete),
        };

        google.script.run
          .withSuccessHandler((result) => {
            submitting = false;
            handleServerState(result);
          })
          .withFailureHandler((error) => {
            submitting = false;
            els.nextButton.disabled = false;
            updateNextButtonLabel();
            els.nextButton.removeAttribute('aria-busy');
            startActiveSegment();
            startSnapshotTimer();
            setSaveStatus('Your answer is still saved on this device.');
            showError(els.questionError, friendlyError(error));
          })
          .saveAndNext(payload);
      }

      function startActiveSegment() {
        if (!assessmentInProgress || !metrics) return;
        if (document.hidden || !document.hasFocus()) return;
        if (activeSegmentStartedAt == null) activeSegmentStartedAt = Date.now();
      }

      function stopActiveSegment() {
        if (activeSegmentStartedAt == null || !metrics) return;
        metrics.activeMs += Math.max(0, Date.now() - activeSegmentStartedAt);
        activeSegmentStartedAt = null;
      }

      function persistState() {
        if (!storageKey || !metrics) return;
        const retentionMs = Math.max(1, Number(state.draftRetentionHours) || 24) * 60 * 60 * 1000;
        const snapshot = {
          ...metrics,
          savedAtMs: Date.now(),
          expiresAtMs: Date.now() + retentionMs,
          activeMs:
            metrics.activeMs +
            (activeSegmentStartedAt == null ? 0 : Math.max(0, Date.now() - activeSegmentStartedAt)),
        };
        try {
          localStorage.setItem(storageKey, JSON.stringify(snapshot));
          setSaveStatus('Draft saved on this device.');
        } catch (error) {
          // Local storage may be blocked. Server-side elapsed timing still works.
        }
      }

      function currentActiveMs() {
        return (
          metrics.activeMs +
          (activeSegmentStartedAt == null ? 0 : Math.max(0, Date.now() - activeSegmentStartedAt))
        );
      }

      function startSnapshotTimer() {
        stopSnapshotTimer();
        if (!assessmentInProgress || !state || !metrics || submitting) return;
        const intervalSeconds = Math.min(
          300,
          Math.max(5, Number(state.snapshotIntervalSeconds) || 15)
        );
        snapshotTimerHandle = setInterval(
          () => {
            captureSnapshot('interval', false);
            flushProgress();
          },
          intervalSeconds * 1000
        );
      }

      function stopSnapshotTimer() {
        if (snapshotTimerHandle != null) {
          clearInterval(snapshotTimerHandle);
          snapshotTimerHandle = null;
        }
      }

      function captureSnapshot(reason, force) {
        if (!assessmentInProgress || !state || !metrics) return;
        const maximumSnapshots = Math.min(
          1000,
          Math.max(50, Number(state.maxSnapshotsPerQuestion) || 250)
        );
        const reservedImportantSnapshots = Math.min(10, maximumSnapshots);
        if (metrics.snapshotSequence >= maximumSnapshots) return;
        if (!force && metrics.snapshotSequence >= maximumSnapshots - reservedImportantSnapshots) return;

        const capturedMs = elapsedSinceQuestionShown();
        const lastSnapshot = metrics.snapshots[metrics.snapshots.length - 1];
        if (
          !force &&
          lastSnapshot &&
          capturedMs - Number(lastSnapshot.capturedMs || 0) < 1000
        ) {
          return;
        }

        const answer = readAnswer();
        metrics.answer = answer;
        metrics.snapshotSequence += 1;
        metrics.snapshots.push({
          snapshotId: createClientId(),
          sequence: metrics.snapshotSequence,
          reason,
          capturedMs,
          activeMs: currentActiveMs(),
          answerCharacters: answer.length,
          answerWords: countWords(answer),
          typedCharacters: metrics.typedCharacters,
          pastedCharacters: metrics.pastedCharacters,
          largestInsertionCharacters: metrics.largestInsertionCharacters,
          deletedCharacters: metrics.deletedCharacters,
          revisionEvents: metrics.revisionEvents,
          pasteCount: metrics.pasteCount,
          tabLeaveCount: metrics.tabLeaveCount,
          blurCount: metrics.blurCount,
          answerSnapshot: state.storeSnapshotText ? answer.slice(0, 20000) : '',
          snapshotTextTruncated: state.storeSnapshotText && answer.length > 20000,
        });
        persistState();
      }

      function flushProgress() {
        if (
          snapshotFlushInProgress ||
          submitting ||
          !assessmentInProgress ||
          !state ||
          !metrics ||
          !metrics.snapshots.length
        ) {
          return;
        }

        const snapshotsToSave = metrics.snapshots.slice();
        const sentIds = new Set(snapshotsToSave.map((snapshot) => snapshot.snapshotId));
        const requestMetrics = metrics;
        const requestStorageKey = storageKey;
        const requestSessionId = state.sessionId;
        const requestQuestionId = state.question.id;
        snapshotFlushInProgress = true;
        setSaveStatus('Saving progress…');

        google.script.run
          .withSuccessHandler((result) => {
            snapshotFlushInProgress = false;
            if (
              metrics !== requestMetrics ||
              storageKey !== requestStorageKey ||
              !state ||
              state.sessionId !== requestSessionId ||
              state.question.id !== requestQuestionId
            ) return;
            if (result && result.ok) {
              const savedIds = new Set(result.savedSnapshotIds || []);
              metrics.snapshots = metrics.snapshots.filter(
                (snapshot) => !sentIds.has(snapshot.snapshotId) || !savedIds.has(snapshot.snapshotId)
              );
              persistState();
              setSaveStatus(`Progress saved at ${new Date().toLocaleTimeString([], {
                hour: '2-digit', minute: '2-digit',
              })}.`);
            } else {
              setSaveStatus('Progress is saved on this device and will be retried.');
            }
          })
          .withFailureHandler(() => {
            snapshotFlushInProgress = false;
            if (metrics === requestMetrics && storageKey === requestStorageKey) {
              setSaveStatus('Progress is saved on this device and will be retried.');
            }
            // Pending snapshots remain in local storage and are retried later
            // or included with the final answer submission.
          })
          .saveProgress({
            sessionId: state.sessionId,
            sessionNonce: state.sessionNonce || '',
            questionId: state.question.id,
            submissionId: metrics.submissionId,
            snapshots: snapshotsToSave,
          });
      }

      function createClientId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          return window.crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(16).slice(2)}-${Math.random()
          .toString(16)
          .slice(2)}`;
      }

      function startOverallTimer() {
        clearInterval(timerHandle);
        updateTimer();
        timerHandle = setInterval(updateTimer, 1000);
      }

      function updateTimer() {
        if (!state || submitting) return;
        const remainingMs = Number(state.deadlineAtMs) - correctedNow();
        els.timer.textContent = `Time remaining: ${formatDuration(Math.max(0, remainingMs))}`;

        if (remainingMs <= 0) {
          clearInterval(timerHandle);
          submitCurrent(true);
        }
      }

      function correctedNow() {
        return Date.now() + clockOffsetMs;
      }

      function finishAssessment(message) {
        assessmentInProgress = false;
        submitting = false;
        stopActiveSegment();
        stopSnapshotTimer();
        clearInterval(timerHandle);
        removeSessionDrafts(state && state.sessionId ? state.sessionId : '');
        try {
          sessionStorage.removeItem('assessmentCandidateToken');
        } catch (error) {
          // Session storage may be disabled.
        }
        els.startView.classList.add('hidden');
        els.assessmentView.classList.add('hidden');
        els.completeView.classList.remove('hidden');
        els.completeMessage.textContent = message;
      }

      function closeForm() {
        els.closeButton.disabled = true;
        window.close();
        setTimeout(() => {
          els.closeButton.classList.add('hidden');
          els.closeHint.classList.remove('hidden');
        }, 150);
      }

      function collectClientInfo() {
        return {
          userAgent: navigator.userAgent,
          language: navigator.language,
          clientPlatform:
            navigator.userAgentData && navigator.userAgentData.platform
              ? navigator.userAgentData.platform
              : '',
          screenWidth: window.screen.width,
          screenHeight: window.screen.height,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        };
      }

      function countWords(text) {
        const trimmed = String(text || '').trim();
        return trimmed ? trimmed.split(/\s+/).length : 0;
      }

      function updateNextButtonLabel() {
        if (!state) return;
        els.nextButton.textContent =
          state.currentNumber === state.totalQuestions ? 'Submit assessment' : 'Save and continue';
      }

      function setSaveStatus(message) {
        els.saveStatus.textContent = String(message || '');
      }

      function cleanupLocalDrafts() {
        const now = Date.now();
        const fallbackExpiryMs = 24 * 60 * 60 * 1000;
        try {
          for (let index = localStorage.length - 1; index >= 0; index -= 1) {
            const key = localStorage.key(index);
            if (!key || !key.startsWith('assessment:')) continue;
            try {
              const saved = JSON.parse(localStorage.getItem(key) || 'null');
              if (!saved || typeof saved !== 'object') {
                localStorage.removeItem(key);
              } else if (Number(saved.expiresAtMs) && Number(saved.expiresAtMs) <= now) {
                localStorage.removeItem(key);
              } else if (!Number(saved.expiresAtMs)) {
                saved.savedAtMs = Number(saved.savedAtMs) || now;
                saved.expiresAtMs = saved.savedAtMs + fallbackExpiryMs;
                localStorage.setItem(key, JSON.stringify(saved));
              }
            } catch (error) {
              localStorage.removeItem(key);
            }
          }
        } catch (error) {
          // Local storage may be disabled.
        }
      }

      function removeSessionDrafts(sessionId) {
        if (!sessionId) return;
        const prefix = `assessment:${sessionId}:`;
        try {
          for (let index = localStorage.length - 1; index >= 0; index -= 1) {
            const key = localStorage.key(index);
            if (key && key.startsWith(prefix)) localStorage.removeItem(key);
          }
        } catch (error) {
          // Local storage may be disabled.
        }
      }

      function formatDuration(milliseconds) {
        const totalSeconds = Math.ceil(milliseconds / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return hours > 0
          ? `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`
          : `${minutes}:${String(seconds).padStart(2, '0')}`;
      }

      function showError(element, message) {
        element.textContent = message;
        element.classList.remove('hidden');
      }

      function hideError(element) {
        element.textContent = '';
        element.classList.add('hidden');
      }

      function friendlyError(error) {
        return error && error.message
          ? error.message
          : 'A connection error occurred. Check your internet connection and try again.';
      }
    </script>
  </body>
</html>
